<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Selection Arena</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #07070a; color: white; font-family: system-ui, sans-serif; margin: 0; padding: 20px; text-align: center; }
        .selection-layout { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 900px; gap: 20px; margin: auto; }
        .game-carousel { display: flex; justify-content: center; gap: 20px; width: 100%; margin: 20px 0; padding: 10px; box-sizing: border-box; }
        
        .game-card { 
            width: 160px; height: 190px; background: #111116; 
            border: 2px solid #222; border-radius: 14px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-size: 0.85rem; font-weight: bold; color: #777; 
            transition: all 0.2s ease-in-out; box-sizing: border-box;
            text-transform: uppercase;
        }
        .game-card .icon { font-size: 3rem; margin-bottom: 10px; filter: grayscale(100%); transition: 0.2s; }
        .game-card.active { border-color: #ff0055; background: #1a0b12; color: white; transform: scale(1.05); box-shadow: 0 0 20px rgba(255,0,85,0.3); }
        .game-card.active .icon { filter: grayscale(0%); }
        .game-card.winner { border-color: #00ff88; background: #0b1a12; color: white; transform: scale(1.1); box-shadow: 0 0 30px rgba(0,255,136,0.5); }
        .game-card.winner .icon { filter: grayscale(0%); animation: bounce 0.5s infinite alternate; }

        .action-btn { background: #ff0055; color: white; font-size: 1.4rem; font-weight: bold; padding: 16px 40px; border: none; border-radius: 10px; cursor: pointer; min-width: 250px; margin-top: 10px; }
        .action-btn:active { transform: scale(0.97); }
        .action-btn:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; }

        #reveal-zone { display: none; margin-top: 25px; background: #111116; padding: 30px; border-radius: 16px; border: 1px solid #222; width: 100%; max-width: 500px; box-sizing: border-box; }
        #launch-btn { background: #00ff88; color: black; font-size: 1.5rem; width: 100%; margin-top: 20px; }
        #loading-msg { color: #00ffff; font-weight: bold; font-size: 1.2rem; margin: 20px; }

        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-8px); } }
    </style>
</head>
<body>

    <div class="selection-layout">
        <h1 id="main-title" style="font-size: 2.2rem; color: white; margin-top: 20px; letter-spacing: 1px;">CHOOSE YOUR CHALLENGE</h1>
        
        <div id="loading-msg">🔍 Scanning GitHub Games Repository...</div>
        <div class="game-carousel" id="carousel-track"></div>

        <button class="action-btn" id="trigger-action-btn" onclick="startSelectionProcess()" disabled>LOADING ARENA...</button>

        <div id="reveal-zone">
            <h3 style="color: #00ff88; margin: 0; font-size: 0.9rem; letter-spacing: 2px;">MATCH ASSIGNED</h3>
            <h1 id="winner-title" style="font-size: 2.2rem; margin: 10px 0;">---</h1>
            <div id="winner-visual" style="font-size: 4.5rem; margin: 15px 0;">🎮</div>
            <p id="winner-desc" style="color: #aaa; font-size: 1.1rem; line-height: 1.5; padding: 0 10px;">---</p>
            <button class="action-btn" id="launch-btn">START MATCH</button>
        </div>
    </div>

    <script>
        // Security Lockout check
        if (sessionStorage.getItem('player_authenticated') !== 'true' || !sessionStorage.getItem('active_coupon')) {
            window.location.href = "index.html";
        }

        // --- UPDATE THESE TWO VALUES TO MATCH YOUR ACCOUNT ---
        const GITHUB_OWNER = "mjak88"; 
        const GITHUB_REPO = "FT_Game_Box";
        
        let gamePool = [];
        let currentActiveIdx = 0, speed = 80, cyclesRemaining = 0;

        // Synth Sound Engine via WebAudio API
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, duration, type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // Scan Directory and Dynamically Import Modules
        async function buildDynamicGamesPool() {
            const track = document.getElementById('carousel-track');
            const loadingMsg = document.getElementById('loading-msg');
            const actionBtn = document.getElementById('trigger-action-btn');

            try {
                // Fetch the subfolders metadata array from the GitHub content pointer API
                const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/games`);
                if (!response.ok) throw new Error("Failed to scan games directory asset path.");
                
                const items = await response.json();
                
                // Filter out everything except directories
                const directories = items.filter(item => item.type === 'dir');

                for (let dir of directories) {
                    try {
                        // Dynamically import the ES module from each subfolder config path
                        const modulePath = `./games/${dir.name}/config.js`;
                        const module = await import(modulePath);
                        
                        if (module.gameMetadata) {
                            gamePool.push(module.gameMetadata);
                        }
                    } catch (configErr) {
                        console.warn(`Skipped path folder "games/${dir.name}": Missing or non-valid config.js module format.`);
                    }
                }

                if (gamePool.length === 0) {
                    loadingMsg.innerText = "⚠️ No valid game folders found with a config.js file.";
                    return;
                }

                // Render out Carousel Cards
                loadingMsg.style.display = "none";
                track.innerHTML = "";
                gamePool.forEach((game, index) => {
                    track.innerHTML += `
                        <div class="game-card" id="game-${index}">
                            <div class="icon">${game.icon}</div>
                            <div>${game.name}</div>
                        </div>
                    `;
                });

                // Unlock interaction mechanics
                actionBtn.innerText = "CHOOSE GAME";
                actionBtn.disabled = false;

            } catch (err) {
                console.error(err);
                loadingMsg.innerText = "❌ Connection error loading game directory from GitHub.";
            }
        }

        function startSelectionProcess() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('trigger-action-btn').style.display = "none";
            document.getElementById('reveal-zone').style.display = "none";
            cyclesRemaining = 15 + Math.floor(Math.random() * 8);
            speed = 80;
            cycleAnimation();
        }

        function cycleAnimation() {
            document.querySelectorAll('.game-card').forEach(card => card.classList.remove('active'));
            currentActiveIdx = (currentActiveIdx + 1) % gamePool.length;
            document.getElementById(`game-${currentActiveIdx}`).classList.add('active');
            
            playTone(300, 0.05, 'triangle');
            cyclesRemaining--;

            if (cyclesRemaining > 0) {
                if (cyclesRemaining < 6) speed += 60;
                setTimeout(cycleAnimation, speed);
            } else {
                finalizeSelection();
            }
        }

        function finalizeSelection() {
            const winningIndex = Math.floor(Math.random() * gamePool.length);
            document.querySelectorAll('.game-card').forEach(card => card.classList.remove('active'));
            document.getElementById(`game-${winningIndex}`).classList.add('winner');

            playTone(587.33, 0.25, 'sine');
            const selectedGame = gamePool[winningIndex];

            document.getElementById('main-title').innerText = "YOUR MATCH IS READY!";
            document.getElementById('winner-title').innerText = selectedGame.name;
            document.getElementById('winner-visual').innerText = selectedGame.icon;
            document.getElementById('winner-desc').innerText = selectedGame.desc;
            
            document.getElementById('launch-btn').onclick = function() {
                window.location.href = selectedGame.file;
            };

            const revealZone = document.getElementById('reveal-zone');
            revealZone.style.display = "block";
            revealZone.scrollIntoView({ behavior: 'smooth' });
        }

        window.addEventListener('DOMContentLoaded', buildDynamicGamesPool);
    </script>
</body>
</html>
