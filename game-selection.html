<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Selection Arena</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .selection-layout { display: flex; flex-direction: column; align-items: center; width: 90%; max-width: 800px; gap: 20px; margin: auto; }
        .game-carousel { display: flex; justify-content: center; gap: 15px; width: 100%; margin: 20px 0; overflow: hidden; padding: 10px; }
        .game-card { 
    width: 140px;          /* Slightly widened from 120px */
    height: 170px;         /* Slightly increased height */
    background: #111; 
    border: 2px solid #333; 
    border-radius: 12px; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center; 
    font-size: 0.75rem;    /* Made text slightly smaller to fit perfectly */
    font-weight: bold; 
    color: #888; 
    transition: all 0.2s ease-in-out; 
    text-transform: uppercase;
}
        .game-card .icon { font-size: 3rem; margin-bottom: 10px; }
        .game-card.active { border-color: #FF0000; color: #fff; background: #200; transform: scale(1.1); box-shadow: 0 0 15px #FF0000; }
        .game-card.winner { border-color: #00ff88; color: #fff; background: #021; transform: scale(1.15); box-shadow: 0 0 25px #00ff88; animation: bounce 0.4s infinite alternate; }
        #reveal-zone { display: none; background: #111; border: 3px solid #00ff88; border-radius: 15px; padding: 25px; width: 100%; max-width: 450px; box-shadow: 0 0 20px rgba(0, 255, 136, 0.2); margin-top: 15px; }
        .btn-launch { display: block; width: 100%; margin-top: 20px; padding: 15px; background: #00ff88; color: #000; font-weight: bold; font-size: 1.2rem; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; }
        @keyframes bounce { from { transform: scale(1.1); } to { transform: scale(1.15); } }
        #loading-msg { color: cyan; font-weight: bold; font-size: 1.2rem; margin: 20px; }
    </style>
</head>
<body style="overflow-y: auto;">

<div class="selection-layout">
    <h1 class="glow-text" id="main-title">LOADING GAMES ARENA...</h1>
    
    <div id="loading-msg">Scanning registry and mounting files...</div>
    
    <div class="game-carousel" id="carousel"></div>

    <div id="reveal-zone">
        <h2 id="winner-title" style="color: #00ff88; margin: 0 0 10px 0; font-size: 2rem; letter-spacing: 1px;">GAME NAME</h2>
        <div id="winner-visual" style="font-size: 5rem; margin: 15px 0;">🎮</div>
        
        <div style="border-top: 1px dashed #333; padding-top: 15px; margin-top: 15px;">
            <h3 style="color: #fff; margin: 0 0 5px 0; font-size: 1.1rem;">HOW TO PLAY:</h3>
            <p id="winner-desc" style="color: #bbb; margin: 0; font-size: 0.95rem; line-height: 1.4;"></p>
        </div>
        
        <button id="launch-btn" class="btn-launch">START GAME</button>
    </div>
</div>

<script src="games-manifest.js"></script>

<script>
    // Security Access Lockdown
    if (sessionStorage.getItem('player_authenticated') !== 'true' || !sessionStorage.getItem('active_coupon')) {
        window.location.href = "index.html";
    }

    const gamePool = [];
    let currentIndex = 0;
    let speed = 80; 
    let cyclesRemaining = 22; 

    const sounds = {
        tick: new Audio('https://assets.mixkit.co/active_storage/sfx/2007/2007-preview.mp3'),
        win: new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3')
    };
    sounds.tick.volume = 0.4;

    // Helper to dynamically inject script tags to read metadata properties asynchronously
    function loadScriptAsync(src) {
        return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = src;
            script.onload = () => resolve();
            script.onerror = () => reject();
            document.head.appendChild(script);
        });
    }

    // Generic Scan Engine Initialization
    async function initializeGenericGamesPool() {
        const carousel = document.getElementById('carousel');
        
        if (typeof ACTIVE_GAMES_MANIFEST === 'undefined' || ACTIVE_GAMES_MANIFEST.length === 0) {
            document.getElementById('loading-msg').innerText = "CRITICAL ERROR: No games found in manifest.";
            return;
        }

        try {
            // Loop through manifest array string pointers
            for (let i = 0; i < ACTIVE_GAMES_MANIFEST.length; i++) {
                const folderName = ACTIVE_GAMES_MANIFEST[i];
                // Read local config parameters file
                await loadScriptAsync(`games/${folderName}/${folderName}-config.js`);
                
                if (window.gameMetadata) {
                    gamePool.push({...window.gameMetadata});
                    
                    // Automatically append clean carousel game cards into live DOM structure layout
                    carousel.innerHTML += `
<div class="game-card" id="game-${i}">
                <span class="icon">${window.gameMetadata.icon}</span>
                <div style="padding: 0 5px; text-align: center;">${window.gameMetadata.name}</div>
            </div>
        `;
                    
                    // Clear window level cache footprint cleanly for subsequent loops
                    window.gameMetadata = null;
                }
            }
            
            // Clean interface assets and trigger animation cycles loops
            document.getElementById('loading-msg').style.display = 'none';
            document.getElementById('main-title').innerText = "SELECTING YOUR GAME...";
            setTimeout(cycleAnimation, 500);

        } catch (error) {
            document.getElementById('loading-msg').innerText = "ERROR LOADING GAME ASSETS OR MISSING CONFIG FILES.";
            console.error(error);
        }
    }

    function cycleAnimation() {
        document.querySelectorAll('.game-card').forEach(card => card.classList.remove('active'));
        currentIndex = (currentIndex + 1) % gamePool.length;
        document.getElementById(`game-${currentIndex}`).classList.add('active');
        
        sounds.tick.currentTime = 0;
        sounds.tick.play().catch(() => {});
        cyclesRemaining--;

        if (cyclesRemaining > 0) {
            if (cyclesRemaining < 6) speed += 70;
            setTimeout(cycleAnimation, speed);
        } else {
            finalizeSelection();
        }
    }

    function finalizeSelection() {
        const winningIndex = Math.floor(Math.random() * gamePool.length);
        document.querySelectorAll('.game-card').forEach(card => card.classList.remove('active'));
        document.getElementById(`game-${winningIndex}`).classList.add('winner');

        sounds.win.play().catch(() => {});
        const selectedGame = gamePool[winningIndex];

        document.getElementById('main-title').innerText = "YOUR MATCH IS READY!";
        document.getElementById('winner-title').innerText = selectedGame.name;
        document.getElementById('winner-visual').innerText = selectedGame.icon;
        document.getElementById('winner-desc').innerText = selectedGame.desc;
        
        document.getElementById('launch-btn').onclick = function() {
            window.location.href = selectedGame.file;
        };

        document.getElementById('reveal-zone').style.display = "block";
        document.getElementById('reveal-zone').scrollIntoView({ behavior: 'smooth' });
    }

    window.addEventListener('DOMContentLoaded', () => {
        initializeGenericGamesPool();
    });
</script>
</body>
</html>
