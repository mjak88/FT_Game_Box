<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crystal Check-in</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #0a0a0f; color: white; text-align: center;
            font-family: system-ui, sans-serif; margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .input-container {
            display: flex; flex-direction: column; gap: 20px;
            width: 85%; max-width: 460px; margin: auto;
            background: #111116; padding: 40px 30px; border-radius: 16px;
            border: 2px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        label { text-align: left; font-size: 0.9rem; color: #aaa; font-weight: bold; margin-bottom: -12px; letter-spacing: 0.5px; }
        input {
            padding: 18px; font-size: 1.4rem; background: #1a1a24;
            border: 2px solid #333; color: white; border-radius: 10px;
            text-align: center; width: 100%; box-sizing: border-box; transition: 0.2s;
        }
        input:focus { border-color: #ff0055; outline: none; background: #222230; }
        button {
            padding: 18px; font-size: 1.3rem; background: #ff0055;
            color: white; border: none; border-radius: 10px;
            cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s;
        }
        button:active { transform: scale(0.98); background: #cc0044; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; transform: none; }
        .error-message { color: #ff0055; font-weight: bold; min-height: 24px; font-size: 1rem; margin-top: -5px; }
    </style>
</head>
<body>

<div class="input-container">
    <h2 style="color: #ff0055; margin: 0 0 10px 0; font-size: 2rem; letter-spacing: 1px;">ENTER DETAILS</h2>
    
    <label for="phone_input">CUSTOMER PHONE NUMBER</label>
    <input type="tel" id="phone_input" placeholder="01XXXXXXXXX" autocomplete="off" inputmode="tel">
    
    <label for="order_input">ODOO ORDER ID</label>
    <input type="text" id="order_input" placeholder="Scan or Enter Order ID" autocomplete="off" style="text-transform: uppercase;">
    
    <div id="check-error" class="error-message"></div>
    
    <button id="next-btn" onclick="validateOrder()">NEXT</button>
</div>

<script>
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbxHucKCCGnTlVtbDEAVQ0uoXVkOB4PE9Ax1a23RqoGaGKS3EL3TKGMlxzMuscolMiCi/exec";

    async function validateOrder() {
        const phone = document.getElementById('phone_input').value.trim();
        const orderId = document.getElementById('order_input').value.trim().toUpperCase();
        const nextBtn = document.getElementById('next-btn');
        const errorMsg = document.getElementById('check-error');

        if (!phone || !orderId) {
            errorMsg.innerText = "Please fill in both fields correctly.";
            return;
        }

        errorMsg.innerText = ""; 
        nextBtn.innerText = "VERIFYING ORDER...";
        nextBtn.disabled = true;

        try {
            const response = await fetch(`${GOOGLE_URL}?action=verify&code=${encodeURIComponent(orderId)}`);
            const result = await response.text();
            
            if (result.trim() === "VALID") {
                sessionStorage.setItem('player_authenticated', 'true');
                sessionStorage.setItem('active_coupon', orderId);
                sessionStorage.setItem('customer_phone', phone);
                window.location.href = "game-selection.html"; 
            } else {
                errorMsg.innerText = "INVALID OR ALREADY PLAYED ORDER NUMBER";
                nextBtn.innerText = "NEXT";
                nextBtn.disabled = false;
            }
        } catch (error) {
            errorMsg.innerText = "SERVER CONNECTION FAILED. TRY AGAIN.";
            nextBtn.innerText = "NEXT";
            nextBtn.disabled = false;
        }
    }

    // Capture tablet soft-keyboard Enter buttons easily
    document.getElementById('order_input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            validateOrder();
        }
    });
</script>
</body>
</html>
