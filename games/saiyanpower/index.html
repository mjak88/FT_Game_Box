<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Element Arena - Battle Z</title>
    <style>
        body { 
            background: #0d0614; 
            color: white; 
            text-align: center; 
            font-family: 'Impact', 'Arial Black', sans-serif; 
            touch-action: manipulation;
            margin: 0;
            padding: 10px;
            overflow: hidden;
        }
        .hud {
            display: flex;
            justify-content: space-around;
            align-items: center;
            max-width: 900px;
            margin: auto;
            background: linear-gradient(180deg, rgba(0,0,0,0.85), rgba(20,10,40,0.6));
            border-bottom: 4px solid #f59e0b;
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.3);
        }
        .hud-stat {
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px #000, 0 0 10px rgba(255,255,255,0.4);
        }
        #timer-span { color: #f43f5e; }
        #score-span { color: #10b981; }
        
        #gameContainer {
            position: relative;
            margin: 15px auto;
            max-width: 95%;
            width: 900px;
        }
        canvas { 
            background: #000; 
            border: 5px solid #f59e0b; 
            display: block; 
            margin: auto; 
            max-width: 100%;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }
        .controls { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            margin-top: 15px; 
        }
        .btn { 
            padding: 15px 40px; 
            font-size: 1.5rem; 
            font-family: 'Impact', sans-serif;
            letter-spacing: 1.5px;
            font-weight: bold; 
            border: 3px solid #fff; 
            cursor: pointer; 
            color: white; 
            border-radius: 12px;
            box-shadow: 0 6px 0 #000;
            transition: 0.1s;
            text-shadow: 1px 1px 2px #000;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #000;
        }
        #fire { background: linear-gradient(135deg, #ff4500, #ff8c00); border-color: #ffcc00; }
        #water { background: linear-gradient(135deg, #1e90ff, #00bfff); border-color: #00ffff; }
        #grass { background: linear-gradient(135deg, #32cd32, #228b22); border-color: #adff2f; }
    </style>
</head>
<body>
    <div class="hud">
        <div class="hud-stat">TIME LEFT: <span id="timer-span">60</span></div>
        <div class="hud-stat" style="color: #ffae00; font-size: 2.2rem;">STAGE ARENA Z</div>
        <div class="hud-stat">POWER: <span id="score-span">0</span></div>
    </div>
    
    <div id="gameContainer">
        <canvas id="gameCanvas" width="900" height="400"></canvas>
    </div>
    
    <div class="controls">
        <button class="btn" id="fire">FIRE</button>
        <button class="btn" id="water">WATER</button>
        <button class="btn" id="grass">GRASS</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
