<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gomu Gomu Crystal Catcher</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            box-shadow: 0 0 50px rgba(0, 100, 255, 0.4);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        canvas {
            display: block;
        }

        #uiOverlay {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
        }

        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 5, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            display: none;
            text-align: center;
        }

        #gameOverScreen h1 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 50px;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.8), 0 0 40px rgba(255, 0, 0, 0.5);
            animation: textPulse 1s infinite alternate;
        }

        #gameOverScreen p {
            font-size: 30px;
            margin-bottom: 40px;
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
        }

        #restartBtn {
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            color: #000;
            background: linear-gradient(45deg, #ff0055, #ffdd00);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.6);
            text-transform: uppercase;
        }

        #restartBtn:hover {
            box-shadow: 0 0 30px rgba(255, 0, 85, 1);
            transform: scale(1.05);
        }

        @keyframes textPulse {
            from { text-shadow: 0 0 20px rgba(255, 0, 0, 0.8); }
            to { text-shadow: 0 0 30px rgba(255, 0, 0, 1), 0 0 10px rgba(255, 255, 255, 0.5); }
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="uiOverlay">
        <div id="scoreDisplay">Score: 0</div>
        <div id="timerDisplay">Time: 30s</div>
    </div>
    
    <div id="gameOverScreen">
        <h1>Time's Up!</h1>
        <p id="finalScoreText">You collected: 0 points</p>
        <button id="restartBtn" onclick="resetGame()">Play Again (Space)</button>
    </div>

    <canvas id="gameCanvas" width="900" height="600"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Elements
    const scoreDisplay = document.getElementById('scoreDisplay');
    const timerDisplay = document.getElementById('timerDisplay');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const finalScoreText = document.getElementById('finalScoreText');

    // Game Variables
    let score = 0;
    let timeLeft = 30;
    let gameActive = true;
    let timerInterval;
    let audioCtx = null;
    let glowPulse = 0;
    let stars = [];

    // Character (inspired by pngfind.com-luffy-png-879937.png, side view)
    const character = {
        x: canvas.width - 100,
        y: canvas.height - 180,
        width: 60,
        height: 120,
        skinColor: '#F5CBA7',
        shirtColor: '#C0392B',
        pantsColor: '#2E86C1'
    };

    // Arm (stretching "hat holder")
    const arm = {
        startX: character.x,
        startY: character.y + 40, // Shoulder height
        currentX: character.x,
        targetX: 30, // Stretch to far left
        state: 'IDLE',
        speed: 45,
        hatWidth: 50,
        hatHeight: 25,
        baseColor: '#D35400', // Straw brown
        bandColor: '#C0392B' // Red band
    };

    // Crystals Array
    let crystals = [];
    let spawnTimer = 0;
    const spawnRate = 25; // Faster spawn

    // Input Events
    canvas.addEventListener('mousedown', triggerArm);
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        triggerArm();
    });

    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            e.preventDefault();
            triggerArm();
        }
    });

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function triggerArm() {
        initAudio();
        if (!gameActive) {
            resetGame();
            return;
        }
        if (arm.state === 'IDLE') {
            arm.state = 'EXTENDING';
        }
    }

    function playCollectSound(isSmall) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;

        if (isSmall) {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(800, now);
            osc.frequency.exponentialRampToValueAtTime(1600, now + 0.08);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
            osc.start(now);
            osc.stop(now + 0.15);
        } else {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(500, now);
            osc.frequency.exponentialRampToValueAtTime(1000, now + 0.12);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(now);
            osc.stop(now + 0.2);
        }
    }

    function generateStars() {
        stars = [];
        for (let i = 0; i < 200; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                opacity: Math.random()
            });
        }
    }

    function spawnCrystal() {
        const isSmall = Math.random() < 0.35;
        let size, speed, points;
        if (isSmall) {
            size = Math.random() * 5 + 15;
            speed = Math.random() * 3 + 6;
            points = 3;
        } else {
            size = Math.random() * 8 + 28;
            speed = Math.random() * 2 + 2.5;
            points = 1;
        }

        crystals.push({
            x: Math.random() * (canvas.width - 250) + 100, // Avoid edge, character
            y: -size,
            size: size,
            speed: speed,
            points: points,
            isSmall: isSmall
        });
    }

    function update() {
        if (!gameActive) return;

        glowPulse += 0.15;

        // 1. Manage Arm Movement
        if (arm.state === 'EXTENDING') {
            arm.currentX -= arm.speed;
            if (arm.currentX <= arm.targetX) {
                arm.currentX = arm.targetX;
                arm.state = 'RETRACTING';
            }
        } else if (arm.state === 'RETRACTING') {
            arm.currentX += arm.speed;
            if (arm.currentX >= arm.startX) {
                arm.currentX = arm.startX;
                arm.state = 'IDLE';
            }
        }

        // 2. Manage Crystals
        spawnTimer++;
        if (spawnTimer >= spawnRate) {
            spawnCrystal();
            spawnTimer = 0;
        }

        for (let i = crystals.length - 1; i >= 0; i--) {
            let c = crystals[i];
            c.y += c.speed;

            // 3. Collision Detection with the HAT
            let hatLeft = arm.currentX - arm.hatWidth / 2;
            let hatRight = arm.currentX + arm.hatWidth / 2;
            let hatTop = arm.startY - arm.hatHeight / 2;
            let hatBottom = arm.startY + arm.hatHeight / 2;

            if (c.x + c.size > hatLeft && 
                c.x < hatRight && 
                c.y + c.size > hatTop && 
                c.y < hatBottom) {
                
                playCollectSound(c.isSmall);
                score += c.points;
                scoreDisplay.textContent = `Score: ${score}`;
                crystals.splice(i, 1);
                continue;
            }

            if (c.y > canvas.height) {
                crystals.splice(i, 1);
            }
        }

        stars.forEach(s => {
            s.opacity += (Math.random() - 0.5) * 0.1;
            if (s.opacity < 0) s.opacity = 0;
            if (s.opacity > 1) s.opacity = 1;
        });

        render();
        requestAnimationFrame(update);
    }

    function render() {
        // Draw Galaxy Background
        const bgGradient = ctx.createRadialGradient(
            canvas.width / 2, canvas.height / 2, 0,
            canvas.width / 2, canvas.height / 2, canvas.width / 1.2
        );
        bgGradient.addColorStop(0, '#100030'); // Dark purple center
        bgGradient.addColorStop(0.5, '#000010'); // Very dark blue
        bgGradient.addColorStop(1, '#000000'); // Black edges
        ctx.fillStyle = bgGradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw Stars
        ctx.fillStyle = '#fff';
        stars.forEach(s => {
            ctx.globalAlpha = s.opacity;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.globalAlpha = 1;

        // Draw Character (Simplified side view based on pixel art)
        ctx.save();
        ctx.translate(character.x, character.y);
        
        // Shirt
        ctx.fillStyle = character.shirtColor;
        ctx.fillRect(0, 20, character.width, 60);
        // Pants
        ctx.fillStyle = character.pantsColor;
        ctx.fillRect(0, 80, character.width, 40);
        
        // Head
        ctx.fillStyle = character.skinColor;
        ctx.beginPath();
        ctx.arc(character.width / 2, 0, 25, 0, Math.PI * 2);
        ctx.fill();
        
        // Hair (Black messy top)
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(character.width / 2, -10, 25, 0, Math.PI, true);
        ctx.fill();

        // Helmet Visor / Face (Small, looking forward)
        ctx.fillStyle = '#00ffff';
        ctx.fillRect(character.width/2 - 10, -5, 15, 10);
        
        ctx.restore();

        // Draw Arm / Hat (Stretching "Gomu Gomu")
        if (arm.state !== 'IDLE' || arm.currentX !== arm.startX) {
            ctx.strokeStyle = character.skinColor; // Skin color for the arm
            ctx.lineWidth = 10;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(arm.startX, arm.startY);
            ctx.lineTo(arm.currentX, arm.startY);
            ctx.stroke();
            
            // Draw Hat (Holding it)
            ctx.save();
            ctx.translate(arm.currentX, arm.startY);
            
            // Hat Base
            ctx.fillStyle = arm.baseColor;
            ctx.beginPath();
            ctx.ellipse(0, 0, arm.hatWidth / 2, arm.hatHeight / 2, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Hat Band
            ctx.fillStyle = arm.bandColor;
            ctx.fillRect(-arm.hatWidth/2, -arm.hatHeight/4, arm.hatWidth, arm.hatHeight/2);
            
            // Glow on hat for interaction
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#fff';
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.strokeRect(-arm.hatWidth/2, -arm.hatHeight/2, arm.hatWidth, arm.hatHeight);
            
            ctx.restore();
        } else {
            // Draw hat on character's head when idle
            ctx.save();
            ctx.translate(character.x + character.width/2, character.y - 15); // Adjust for head position
            
            // Hat Base
            ctx.fillStyle = arm.baseColor;
            ctx.beginPath();
            ctx.ellipse(0, 0, arm.hatWidth / 2, arm.hatHeight / 2, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Hat Band
            ctx.fillStyle = arm.bandColor;
            ctx.fillRect(-arm.hatWidth/2, -arm.hatHeight/4, arm.hatWidth, arm.hatHeight/2);
            
            ctx.restore();
        }

        // Draw Crystals
        let currentGlowSize = 20 + Math.sin(glowPulse) * 8;
        crystals.forEach(c => {
            ctx.save();
            ctx.shadowBlur = currentGlowSize;
            ctx.shadowColor = '#ff0044';
            
            let gradient = ctx.createRadialGradient(c.x, c.y, 1, c.x, c.y, c.size);
            gradient.addColorStop(0, '#000000'); 
            gradient.addColorStop(0.2, '#400008'); 
            gradient.addColorStop(0.7, '#ff0033'); 
            gradient.addColorStop(1, '#ff6688');   

            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.moveTo(c.x, c.y - c.size / 1.5);
            ctx.lineTo(c.x + c.size / 2, c.y);
            ctx.lineTo(c.x, c.y + c.size / 1.5);
            ctx.lineTo(c.x - c.size / 2, c.y);
            ctx.closePath();
            ctx.fill();

            ctx.globalCompositeOperation = 'screen';
            ctx.fillStyle = 'rgba(255, 200, 210, 0.9)';
            ctx.fillRect(c.x - 1, c.y - c.size/4, 2, c.size/2);
            
            ctx.restore();
        });
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            timerDisplay.textContent = `Time: ${timeLeft}s`;

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                endGame();
            }
        }, 1000);
    }

    function endGame() {
        gameActive = false;
        finalScoreText.textContent = `Final Score: ${score} points!`;
        gameOverScreen.style.display = 'flex';
    }

    function resetGame() {
        clearInterval(timerInterval);
        score = 0;
        timeLeft = 30;
        crystals = [];
        spawnTimer = 0;
        arm.currentX = arm.startX;
        arm.state = 'IDLE';
        generateStars(); 
        
        scoreDisplay.textContent = `Score: ${score}`;
        timerDisplay.textContent = `Time: ${timeLeft}s`;
        gameOverScreen.style.display = 'none';
        
        gameActive = true;
        startTimer();
        update();
    }

    // Start!
    resetGame();
</script>

</body>
</html>
