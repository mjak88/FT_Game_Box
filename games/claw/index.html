<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gomu Gomu Crystal Catcher</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #000;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; font-family: 'Courier New', Courier, monospace; color: #fff; overflow: hidden;
        }
        #gameContainer {
            position: relative; box-shadow: 0 0 50px rgba(0, 100, 255, 0.4);
            border-radius: 12px; overflow: hidden; border: 2px solid rgba(255, 255, 255, 0.2);
        }
        canvas { display: block; }
        #uiOverlay {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; font-size: 24px;
            font-weight: bold; pointer-events: none; text-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="uiOverlay">
        <div id="scoreDisplay">Score: 0</div>
        <div id="timerDisplay">Time: 30s</div>
    </div>
    <canvas id="gameCanvas" width="900" height="600"></canvas>
</div>

<script src="claw-config.js"></script>
<script src="script.js"></script>
</body>
</html>
