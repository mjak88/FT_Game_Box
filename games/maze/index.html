<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Mystic Maze Run</title>
    <link rel="stylesheet" href="../../style.css">
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #0b0f19;
            color: #e2e8f0;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            touch-action: manipulation;
        }
        .container {
            text-align: center;
            background-color: #111827;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid #1f2937;
            max-width: 650px;
            width: 95%;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #030712;
            padding: 14px 20px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 1.1rem;
            font-weight: bold;
        }
        #timer { color: #ef4444; font-size: 1.3rem; }
        .progress-container {
            width: 100%;
            background-color: #374151;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        #progress-bar {
            width: 100%;
            height: 100%;
            background-color: #ef4444;
            transition: width 0.1s linear;
        }
        canvas {
            background-color: #030712;
            border: 4px solid #374151;
            border-radius: 8px;
            display: block;
            margin: 0 auto 15px auto;
            width: 90% !important;
            max-width: 500px;
            height: auto;
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 75px);
            grid-template-rows: repeat(3, 75px);
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }
        .dbtn {
            background-color: #1f2937;
            color: white;
            border: 2px solid #374151;
            border-radius: 12px;
            font-size: 1.6rem;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .dbtn:active { background-color: #3b82f6; border-color: #60a5fa; }
        #up { grid-column: 2; grid-row: 1; }
        #left { grid-column: 1; grid-row: 2; }
        #right { grid-column: 3; grid-row: 2; }
        #down { grid-column: 2; grid-row: 3; }
    </style>
</head>
<body>

<div class="container">
    <div class="status-bar">
        <div id="status">Find the green exit square!</div>
        <div id="timer">60.0s</div>
    </div>
    
    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>
    
    <canvas id="mazeCanvas"></canvas>
    
    <div class="dpad">
        <button class="dbtn" id="up">▲</button>
        <button class="dbtn" id="left">◀</button>
        <button class="dbtn" id="right">▶</button>
        <button class="dbtn" id="down">▼</button>
    </div>
</div>

<script src="maze-config.js"></script>
<script src="script.js"></script>
</body>
</html>
